// Quick localhost Mock UI for experimenting. 
// Serve this file via python3 -m hhtp.server <port> 
// You need a mock smerp server running on localhost:8080 

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebUi Test</title>

    <style>
        body {
            font-family: sans-serif;
            font-size: 15px;
        }

        main {
            width: 100%;
            display: flex;
            justify-content: center;
            align-content: center;
            padding-top: 150px;
        }

        #app {
            border: 1px solid #ccc;
            border-radius: 8px;
            width: 800px;
            max-width: 800px;
        }
    </style>
</head>
<body>

    <main>
        <div id="app"></div>
    </main>

    <script type="module">
        import { 
            PrivateIdentity,
            SmerpClient,
            WebBootloader,    
        } from "../index.js";

        const identity = await PrivateIdentity.generate();


        const appEl = document.getElementById("app");
        appEl.klass = new WebBootloader({
            el: appEl,
            debug:true
        });
        appEl.klass.hydrate();
        
        // Test entities for experimenting.
        // bob identity.
        window.bobIdentity = await PrivateIdentity.generate();
        window.bobPublicHex = await bobIdentity.exportPublicHex();
        window.bobSmerpClient = new SmerpClient({identity: bobIdentity, debug:true});

        // tom identity.
        window.tomIdentity = await PrivateIdentity.generate();
        window.tomPublicHex = await tomIdentity.exportPublicHex();
        window.tomSmerpClient = new SmerpClient({identity: tomIdentity, debug:true});
    </script>

</body>
</html>
